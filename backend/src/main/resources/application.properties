spring.application.name=eventmgmt

# ─── MongoDB Atlas ────────────────────────────────────────────────────────────
# Replace with your Atlas connection string:
# mongodb+srv://<user>:<password>@<cluster>.mongodb.net/<dbname>?retryWrites=true&w=majority
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=eventmgmt

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.origins=http://localhost:5173,http://localhost:3000,https://event-management-system-java-6mmw.vercel.app,https://event-management-system-java-6mmw-f2usgf28h.vercel.app
# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Swagger ──────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.eventmgmt=DEBUG
logging.level.org.springframework.security=WARN
